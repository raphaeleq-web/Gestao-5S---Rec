<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestão de 5S — Recuperação Química Suzano Jacareí</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#003D1F 0%,#005B2E 55%,#007A3D 100%);
  min-height:100vh;display:flex;flex-direction:column;
}

.hero{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px 24px;text-align:center;
}
.logo-wrap{
  background:white;border-radius:20px;
  padding:12px 18px;margin-bottom:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
.logo-wrap img{height:44px;width:auto;display:block;}
h1{color:white;font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.sub{color:rgba(255,255,255,0.65);font-size:13px;font-weight:500;}

.cards{
  background:#F4F6F4;border-radius:28px 28px 0 0;
  padding:24px 20px 48px;
}
.cards-label{
  font-size:11px;font-weight:700;color:#6B7280;
  text-transform:uppercase;letter-spacing:1px;
  text-align:center;margin-bottom:16px;
}

.app-card{
  display:flex;align-items:center;gap:16px;
  background:white;border-radius:18px;padding:16px;
  margin-bottom:12px;text-decoration:none;
  box-shadow:0 2px 16px rgba(0,0,0,0.07);
  border:none;width:100%;cursor:pointer;
  transition:transform 0.15s;
}
.app-card:active{transform:scale(0.97);}

.app-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.icon-green{
  background:linear-gradient(135deg,#005B2E,#007A3D);
  box-shadow:0 4px 12px rgba(0,91,46,0.35);
}
.icon-purple{
  background:linear-gradient(135deg,#4F46E5,#6D28D9);
  box-shadow:0 4px 12px rgba(109,40,217,0.35);
}

.app-text{flex:1;text-align:left;}
.app-title{font-size:17px;font-weight:700;color:#1C1C1E;margin-bottom:3px;}
.app-desc{font-size:13px;color:#6B7280;line-height:1.4;}
.app-arrow{color:#D1D5DB;font-size:22px;flex-shrink:0;}

.qr-section{
  background:white;border-radius:16px;
  padding:16px;margin-top:4px;
}
.qr-section-label{
  font-size:11px;font-weight:700;color:#6B7280;
  text-transform:uppercase;letter-spacing:0.8px;
  margin-bottom:12px;
}
.qr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qr-card{
  border-radius:12px;padding:12px;text-align:center;
}
.qr-card.green{background:#E8F5EE;border:1px solid #C6E0CF;}
.qr-card.purple{background:#F5F3FF;border:1px solid #D8D0F8;}
.qr-card h4{font-size:12px;font-weight:700;margin-bottom:2px;}
.qr-card.green h4{color:#005B2E;}
.qr-card.purple h4{color:#6D28D9;}
.qr-card p{font-size:10px;color:#6B7280;margin-bottom:8px;}
.qr-card canvas,.qr-card img{width:100%;border-radius:6px;}

.footer{
  text-align:center;font-size:11px;color:#9CA3AF;
  margin-top:16px;
}
</style>
</head>

<script>
window.addEventListener('load', function(){
  var base = location.origin + location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
  if(typeof QRCode !== 'undefined'){
    new QRCode(document.getElementById('qr-gestao'), {
      text: base + '/gestao.html',
      width: 140, height: 140,
      colorDark: '#005B2E', colorLight: '#E8F5EE',
      correctLevel: QRCode.CorrectLevel.M
    });
    new QRCode(document.getElementById('qr-exec'), {
      text: base + '/execucao.html',
      width: 140, height: 140,
      colorDark: '#6D28D9', colorLight: '#F5F3FF',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
});
</script>
