<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestão de 5S — Recuperação Química Suzano Jacareí</title>
<style>
:root{
  --green:#005B2E; --green2:#007A3D; --green-bg:#E8F5EE;
  --black:#1A1A1A; --gray:#6B7280; --gray-cl:#F4F6F4;
  --red:#DC2626; --yellow:#F59E0B; --blue:#2563EB; --purple:#6D28D9;
  --white:#fff; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-cl);color:var(--black);}

.app-header{
  background:var(--green);padding:0 16px;height:60px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.app-header img{height:32px;background:white;border-radius:8px;padding:3px 6px;flex-shrink:0;}
.app-header-text h1{font-size:13px;font-weight:700;color:white;line-height:1.2;}
.app-header-text p{font-size:10px;color:rgba(255,255,255,0.65);font-weight:500;}

.section-head{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;color:white;
}
.section-head h2{font-size:16px;font-weight:700;margin-bottom:2px;}
.section-head p{font-size:12px;opacity:0.75;}

/* FILTROS */
.filtros-card{
  background:white;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:12px;
  box-shadow:0 1px 8px rgba(0,0,0,0.06);
}
.filtros-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.filtro-label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:4px;}
select{
  width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:10px;
  font-size:14px;-webkit-appearance:none;background:white;
  font-family:inherit;color:var(--black);
}
select:focus{outline:none;border-color:var(--green);}
input[type=date]{
  width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:10px;
  font-size:13px;background:white;font-family:inherit;
}

/* LISTA */
.lista-wrap{padding:8px 16px 32px;max-width:520px;margin:0 auto;}

/* CARD DESVIO */
.dcard{
  background:white;border-radius:var(--radius);padding:14px;
  margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,0.06);
  border-left:4px solid #E5E7EB;
}
.dcard.org{border-left-color:var(--yellow);}
.dcard.limp{border-left-color:var(--blue);}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.dcard-area{font-size:14px;font-weight:700;color:var(--green);}
.dcard-meta{font-size:11px;color:var(--gray);margin-top:2px;}
.tipo-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tipo-tag.org{background:#FFFBEB;color:#92400E;}
.tipo-tag.limp{background:#EFF6FF;color:#1E40AF;}
.dcard-obs{font-size:13px;color:var(--black);margin-bottom:8px;}
.dcard-foto{width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
.dcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.status{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.status.aberto{background:#FEF2F2;color:var(--red);}
.status.andamento{background:#FFFBEB;color:#92400E;}
.status.concluido,.status.tratado{background:var(--green-bg);color:var(--green);}
.dcard-dates{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
.dcard-dates span{font-size:12px;font-weight:600;}

/* BOTÃO ATUALIZAR */
.btn-atualizar{
  margin-top:12px;width:100%;padding:13px;
  background:var(--green);color:white;border:none;
  border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.btn-atualizar:active{opacity:0.82;}
.btn-avancar-status{display:none;} /* alias */

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);z-index:500;
  align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:white;border-radius:24px 24px 0 0;
  padding:20px 20px 36px;width:100%;max-width:480px;
  box-shadow:0 -8px 32px rgba(0,0,0,0.15);
}
.modal-handle{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:0 auto 18px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
input[type=text]{
  width:100%;padding:12px 14px;border:2px solid #E5E7EB;border-radius:10px;
  font-size:15px;color:var(--black);background:white;font-family:inherit;
}
input[type=file]{display:none;}
.foto-modal-label{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--green-bg);border:2px dashed var(--green);
  border-radius:10px;padding:14px;cursor:pointer;
  font-size:14px;font-weight:600;color:var(--green);
}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.btn:active{opacity:0.82;}
.btn-green{background:var(--green);color:white;margin-bottom:10px;}
.btn-outline{background:white;color:var(--green);border:2px solid var(--green);}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--gray);}
.empty .ico{font-size:48px;margin-bottom:10px;}
.empty p{font-size:14px;}

/* SPINNER */
.loading-wrap{text-align:center;padding:48px 16px;}
.spinner{width:44px;height:44px;border:4px solid #E5E7EB;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap p{font-size:14px;font-weight:600;color:var(--green);margin-bottom:4px;}
.loading-wrap span{font-size:12px;color:var(--gray);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--black);color:white;padding:12px 22px;
  border-radius:30px;font-size:14px;font-weight:600;
  z-index:999;transition:transform 0.3s cubic-bezier(.34,1.4,.64,1);
  white-space:nowrap;max-width:90vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
</style>
</head>

function sbH(){return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};}
async function sbGet(path){return fetch(SB_URL+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});}
async function sbPost(path,body){return fetch(SB_URL+path,{method:'POST',headers:sbH(),body:JSON.stringify(body)});}
async function sbPatch(path,body){return fetch(SB_URL+path,{method:'PATCH',headers:{...sbH(),'Prefer':'return=minimal'},body:JSON.stringify(body)});}
async function uploadFoto(b64,prefix){
  const res=await fetch(b64);const blob=await res.blob();
  const ext=blob.type.split('/')[1]||'jpg';
  const name=prefix+'-'+Date.now()+'.'+ext;
  const up=await fetch(SB_URL+'/storage/v1/object/fotos/'+name,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':blob.type},body:blob});
  if(up.ok) return SB_URL+'/storage/v1/object/public/fotos/'+name;
  return b64; // fallback base64
}

function dCardHTML(x, modo){
  const sMap={aberto:'🔴 A iniciar',andamento:'🟡 Em andamento',concluido:'🟢 Concluído',tratado:'🟢 Concluído'};
  const dtCriacao=new Date(x.created).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  const dtUpdate=x.updated_at?new Date(x.updated_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):null;
  const tc=x.tipo==='organizacao'?'org':'limp';
  const tl=x.tipo==='organizacao'?'📦 Org':'🧹 Limp';
  const prox=x.status==='aberto'?'andamento':x.status==='andamento'?'concluido':null;
  const btnLabel='✏️ Atualizar status';
  const btnColor='var(--sz-green)';

  const btnAtualizar = (modo==='execucao' && prox) ? `
    <button
      class="btn-avancar-status"
      data-id="${x.id}"
      data-prox="${prox}"
      style="margin-top:12px;width:100%;padding:13px;background:${btnColor};color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;"
    >${btnLabel}</button>` : '';

  return `<div class="dcard ${tc}">
    <div class="dcard-top">
      <div style="flex:1;min-width:0;">
        <div class="dcard-area">${x.area?x.area.replace('|',' · '):''}</div>
        ${modo!=='execucao'?`<div class="dcard-meta">${x.nome||''}</div>`:''}
        <div style="margin-top:4px;display:flex;flex-direction:column;gap:2px;">
          <span style="font-size:12px;color:var(--sz-green);font-weight:600;">📅 Aberto: ${dtCriacao}</span>
          ${dtUpdate?`<span style="font-size:12px;color:var(--amarelo);font-weight:600;">🔄 Atualizado: ${dtUpdate}</span>`:''}
          ${x.letra_exec?`<span style="font-size:12px;color:var(--sz-gray);">Turma: <strong>${x.letra_exec}</strong>${x.nomes_exec?' · '+x.nomes_exec:''}</span>`:''}
        </div>
      </div>
      <span class="tipo-tag ${tc}" style="flex-shrink:0;">${tl}</span>
    </div>
    ${x.obs?`<div class="dcard-obs">${x.obs}</div>`:''}
    ${(x.foto&&modo!=='execucao')?`<img class="dcard-foto" src="${x.foto}" loading="lazy">`:(x.foto?'<div style="font-size:12px;color:var(--gray);padding:6px 0;">📷 Foto disponível</div>':'')}
    <div class="dcard-footer" style="margin-top:8px;">
      <span class="status ${x.status}">${sMap[x.status]}</span>
    </div>
    ${btnAtualizar}
  </div>`;
}

async function avancar(id,ns){
  const fotoInp=document.getElementById('foto-av-'+id);
  if(!fotoInp||!fotoInp.files||!fotoInp.files[0]){
    toast('Necessário anexar foto para atualizar','err');
    return;
  }
  const letra=document.getElementById('letra-av-'+id)?document.getElementById('letra-av-'+id).value:'';
  const nomes=document.getElementById('nomes-av-'+id)?document.getElementById('nomes-av-'+id).value.trim():'';
  const btn=event.target;
  btn.disabled=true;btn.textContent='Enviando...';
  try{
    const fotoUrl=await uploadFoto(await toB64(fotoInp.files[0]),'status');
    const payload={status:ns,foto:fotoUrl,updated_at:new Date().toISOString()};
    if(letra) payload.letra_exec=letra;
    if(nomes) payload.nomes_exec=nomes;
    const res=await sbPatch('/rest/v1/desvios?id=eq.'+id,payload);
    if(!res.ok)throw new Error(await res.text());
    toast('Status atualizado!','ok');
    renderBacklog();
  }catch(e){toast('Erro: '+e.message,'err');}
  finally{btn.disabled=false;}
}

function toB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

/* PAINEL */
async function renderPainel(){
  try{
    const filtArea = document.getElementById('p-filtro-area')?.value || 'todas';
    const periodo  = document.getElementById('p-filtro-periodo')?.value || 'todos';
    const dataIni  = document.getElementById('p-data-ini')?.value;
    const dataFim  = document.getElementById('p-data-fim')?.value;

    let url = '/rest/v1/desvios?select=id,area,tipo,status,created,updated_at,letra_exec,nomes_exec&order=created.asc&limit=1000';
    if(filtArea !== 'todas') url += '&area=like.'+filtArea+'%7C*';

    const res = await sbGet(url);
    let d = await res.json();

    if (!Array.isArray(d)) {
      throw new Error('Supabase: ' + (d.message || d.hint || d.error || JSON.stringify(d)));
    }

    // Filtro por período
    const agora = new Date();
    if(periodo === 'semana'){
      const ini = new Date(agora); ini.setDate(ini.getDate() - ini.getDay());
      ini.setHours(0,0,0,0);
      d = d.filter(x => new Date(x.created) >= ini);
    } else if(periodo === 'mes'){
      const ini = new Date(agora.getFullYear(), agora.getMonth(), 1);
      d = d.filter(x => new Date(x.created) >= ini);
    } else if(periodo === 'custom' && dataIni){
      const ini = new Date(dataIni + 'T00:00:00');
      const fim = dataFim ? new Date(dataFim + 'T23:59:59') : agora;
      d = d.filter(x => { const dt = new Date(x.created); return dt >= ini && dt <= fim; });
    }

    // Stats principais
    const concluidos = d.filter(x => x.status==='concluido'||x.status==='tratado');
    document.getElementById('p-d-tot').textContent = d.length;
    document.getElementById('p-d-ab').textContent  = d.filter(x=>x.status==='aberto').length;
    document.getElementById('p-d-and').textContent = d.filter(x=>x.status==='andamento').length;
    document.getElementById('p-d-tr').textContent  = concluidos.length;

    // 1. Taxa de conclusão por área
    const taxaEl = document.getElementById('p-taxa-areas');
    taxaEl.innerHTML = AREAS_LIST.map(a => {
      const total = d.filter(x => x.area && x.area.startsWith(a+'|') || x.area===a).length;
      const conc  = d.filter(x => (x.area && x.area.startsWith(a+'|') || x.area===a) && (x.status==='concluido'||x.status==='tratado')).length;
      if(!total) return '';
      const pct = Math.round(conc/total*100);
      const cor = pct>=80?'var(--sz-green)':pct>=50?'var(--amarelo)':'var(--vermelho)';
      return `<div class="bar-row">
        <div class="bar-label"><span>${a}</span><span style="color:${cor};font-weight:700;">${pct}% (${conc}/${total})</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cor};"></div></div>
      </div>`;
    }).join('');

    // 2. Tempo médio de resolução
    const tempos = concluidos
      .filter(x => x.updated_at)
      .map(x => (new Date(x.updated_at) - new Date(x.created)) / (1000*60*60*24));
    const tempoMedio = tempos.length ? (tempos.reduce((a,b)=>a+b,0)/tempos.length).toFixed(1) : '—';
    document.getElementById('p-tempo-val').textContent = tempoMedio;

    // 4. Ranking de turmas
    const turmas = {};
    d.filter(x=>x.letra_exec).forEach(x=>{ turmas[x.letra_exec]=(turmas[x.letra_exec]||0)+1; });
    const rankEl = document.getElementById('p-ranking-turmas');
    const sorted = Object.entries(turmas).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length){
      rankEl.innerHTML = '<p style="font-size:13px;color:var(--sz-gray);text-align:center;padding:8px;">Nenhuma atualização registrada</p>';
    } else {
      const max = sorted[0][1];
      rankEl.innerHTML = sorted.map(([turma,n],i) => `
        <div class="bar-row">
          <div class="bar-label">
            <span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} Turma ${turma}</span>
            <span style="font-weight:700;">${n} tratamentos</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(n/max*100)}%;background:var(--roxo);"></div></div>
        </div>`).join('');
    }

    // % conclusão por turma (letra)
    const letras = ['A','B','C','D','E','Adm'];
    const concLetraEl = document.getElementById('p-conc-letra');
    const letraRows = letras.map(l => {
      const total = d.filter(x => x.letra_exec === l).length;
      const conc2 = d.filter(x => x.letra_exec === l && (x.status==='concluido'||x.status==='tratado')).length;
      if(!total) return '';
      const pct = Math.round(conc2/total*100);
      const cor = pct>=80?'var(--sz-green)':pct>=50?'var(--amarelo)':'var(--vermelho)';
      return `<div class="bar-row">
        <div class="bar-label"><span>Turma ${l}</span><span style="color:${cor};font-weight:700;">${pct}% (${conc2}/${total})</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cor};"></div></div>
      </div>`;
    }).filter(Boolean).join('');
    concLetraEl.innerHTML = letraRows || '<p style="font-size:13px;color:var(--sz-gray);text-align:center;padding:8px;">Sem dados</p>';

    // 7. Evolução temporal (últimos 14 dias ou período)
    renderEvolucao(d);

  }catch(e){ console.error(e); }
}

function renderEvolucao(d){
  const canvas = document.getElementById('p-chart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  // Agrupar por dia
  const dias = {};
  d.forEach(x => {
    const dia = new Date(x.created).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    if(!dias[dia]) dias[dia] = {abertos:0, concluidos:0};
    dias[dia].abertos++;
    if(x.status==='concluido'||x.status==='tratado') dias[dia].concluidos++;
  });

  const labels = Object.keys(dias).slice(-14);
  const abertos = labels.map(d => dias[d].abertos);
  const conc    = labels.map(d => dias[d].concluidos);

  const W = canvas.parentElement.offsetWidth || 300;
  canvas.width  = W;
  canvas.height = 160;
  ctx.clearRect(0,0,W,160);

  if(!labels.length){ ctx.fillStyle='#9CA3AF'; ctx.font='13px sans-serif'; ctx.fillText('Sem dados',W/2-30,80); return; }

  const pad = {top:10,right:10,bottom:30,left:28};
  const cw = W - pad.left - pad.right;
  const ch = 160 - pad.top - pad.bottom;
  const maxVal = Math.max(...abertos,...conc,1);
  const bw = cw / labels.length;

  // Grid
  ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(r=>{
    const y = pad.top + ch*(1-r);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillStyle='#9CA3AF'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxVal*r), pad.left-2, y+3);
  });

  // Barras abertos (vermelho claro)
  ctx.fillStyle='rgba(220,38,38,0.25)';
  abertos.forEach((v,i)=>{
    const h = (v/maxVal)*ch;
    ctx.fillRect(pad.left+i*bw+2, pad.top+ch-h, bw*0.45, h);
  });

  // Barras concluídos (verde)
  ctx.fillStyle='rgba(0,91,46,0.7)';
  conc.forEach((v,i)=>{
    const h = (v/maxVal)*ch;
    ctx.fillRect(pad.left+i*bw+bw*0.5, pad.top+ch-h, bw*0.45, h);
  });

  // Labels X
  ctx.fillStyle='#6B7280'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i)=>{ ctx.fillText(l, pad.left+i*bw+bw/2, 160-pad.bottom+12); });

  // Legenda
  ctx.fillStyle='rgba(220,38,38,0.5)'; ctx.fillRect(pad.left,148,10,8);
  ctx.fillStyle='#6B7280'; ctx.textAlign='left'; ctx.font='10px sans-serif';
  ctx.fillText('Abertos', pad.left+13, 156);
  ctx.fillStyle='rgba(0,91,46,0.7)'; ctx.fillRect(pad.left+70,148,10,8);
  ctx.fillStyle='#6B7280'; ctx.fillText('Concluídos', pad.left+83, 156);
}

async function renderBacklog(append){
  const el=document.getElementById('bl-out');
  if(!el) return;
  if(!append){
    el.innerHTML='<div class="loading-wrap"><div class="spinner"></div><p>Carregando dados...</p><span>Buscando desvios no servidor</span></div>';
  } else {
    const loadMore=document.getElementById('bl-load-more');
    if(loadMore) loadMore.textContent='Carregando...';
  }
  try{
    const ord=document.getElementById('bl-sel-ord')?document.getElementById('bl-sel-ord').value:'asc';
    let url='/rest/v1/desvios?select=id,area,tipo,status,created,updated_at,letra_exec,nomes_exec,nome,obs,foto'
      +'&order=created.'+ord
      +'&limit='+BL_PAGE+'&offset='+blOffset;
    if(blFiltSt!=='todos') url+='&status=eq.'+blFiltSt;
    if(blFiltAr!=='todas'){
      if(blFiltAr.includes('|')) url+='&area=eq.'+blFiltAr;
      else url+='&area=like.'+blFiltAr+'%7C*';
    }
    const res=await sbGet(url);
    const d=await res.json();
    if(!Array.isArray(d)) throw new Error(d.message||d.hint||JSON.stringify(d));
    const cards=d.map(function(x){return dCardHTML(x,'execucao');}).join('');
    if(!append){
      el.innerHTML=d.length?cards:'<div class="empty"><div class="ico">✅</div><p>Nenhum desvio encontrado</p></div>';
    } else {
      const btn=document.getElementById('bl-load-more');
      if(btn) btn.outerHTML=cards;
    }
    if(d.length===BL_PAGE){
      const btn=document.createElement('button');
      btn.id='bl-load-more';
      btn.textContent='Carregar mais ('+BL_PAGE+')';
      btn.style.cssText='width:100%;padding:14px;background:white;border:2px solid var(--green);color:var(--green);border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit;';
      btn.onclick=function(){blOffset+=BL_PAGE;renderBacklog(true);};
      el.appendChild(btn);
    }
    el.querySelectorAll('.btn-avancar-status').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        abrirModal(this.getAttribute('data-id'),this.getAttribute('data-prox'));
      });
    });
  }catch(e){
    if(!append) el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Erro: '+e.message+'</p></div>';
    else toast('Erro ao carregar mais: '+e.message,'err');
  }
}

  const base=(qrEl?qrEl.value.trim():'').replace(/\/$/,'') || (location.origin+location.pathname.replace(/\/$/,''));
  if(!base){toast('URL não disponível','err');return;}
  const out=document.getElementById('qr-out');
  if(!out) return;
  const perfis=[
    {label:'QR Gestão',sub:'Inserir desvios · Painel de indicadores',url:base+'?perfil=gestao',cor:'#005B2E'},
    {label:'QR Execução',sub:'Tratar desvios do backlog',url:base+'?perfil=execucao',cor:'#6D28D9'}
  ];
  out.innerHTML='';
  out.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;';
  perfis.forEach(function(p,i){
    const div=document.createElement('div');
    div.style.cssText='background:white;border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,0.07);border-top:4px solid '+p.cor+';';
    div.innerHTML='<div style="font-size:13px;font-weight:700;color:'+p.cor+';margin-bottom:2px;">'+p.label+'</div>'
      +'<div style="font-size:10px;color:var(--sz-gray);margin-bottom:10px;">'+p.sub+'</div>'
      +'<div id="qr-wrap-'+i+'" style="display:flex;justify-content:center;margin-bottom:8px;"></div>'
      +'<div style="font-size:9px;color:var(--sz-gray);word-break:break-all;">'+p.url+'</div>';
    out.appendChild(div);
    if(typeof QRCode!=='undefined'){
      setTimeout(function(){
        new QRCode(document.getElementById('qr-wrap-'+i),{
          text:p.url,width:130,height:130,
          colorDark:p.cor,colorLight:'#ffffff',
          correctLevel:QRCode.CorrectLevel.M
        });
      },150*i);
    }
  });
}

// Reescrever dCardHTML para execucao
function dCardHTML(x, modo){
  var sMap={aberto:'🔴 A iniciar',andamento:'🟡 Em andamento',concluido:'🟢 Concluído',tratado:'🟢 Concluído'};
  var dtC=new Date(x.created).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  var dtU=x.updated_at?new Date(x.updated_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):null;
  var tc=x.tipo==='organizacao'?'org':'limp';
  var tl=x.tipo==='organizacao'?'📦 Org':'🧹 Limp';
  var prox=x.status==='aberto'?'andamento':x.status==='andamento'?'concluido':null;
  var area=(x.area||'').replace('|',' · ');
  var btn=prox?('<button class="btn-atualizar btn-avancar-status" data-id="'+x.id+'" data-prox="'+prox+'">✏️ Atualizar status</button>'):'';
  return '<div class="dcard '+tc+'">'
    +'<div class="dcard-top">'
    +'<div style="flex:1;min-width:0;">'
    +'<div class="dcard-area">'+area+'</div>'
    +'<div class="dcard-dates">'
    +'<span style="color:var(--green);">📅 Aberto: '+dtC+'</span>'
    +(dtU?'<span style="color:var(--yellow);">🔄 Atualizado: '+dtU+'</span>':'')
    +(x.letra_exec?'<span style="color:var(--gray);">Turma: <strong>'+x.letra_exec+'</strong>'+(x.nomes_exec?' · '+x.nomes_exec:'')+'</span>':'')
    +'</div>'
    +'</div>'
    +'<span class="tipo-tag '+tc+'">'+tl+'</span>'
    +'</div>'
    +(x.obs?'<div class="dcard-obs">'+x.obs+'</div>':'')
    +(x.foto?'<img class="dcard-foto" src="'+x.foto+'">':'')
    +'<div class="dcard-footer">'
    +'<span class="status '+x.status+'">'+sMap[x.status]+'</span>'
    +'</div>'
    +btn
    +'</div>';
}

// renderBacklog para execucao
async function renderBacklog(){
  var el=document.getElementById('bl-out');
  if(!el) return;
  el.innerHTML='<div class="loading-wrap"><div class="spinner"></div><p>Carregando dados...</p><span>Buscando desvios no servidor</span></div>';
  try{
    var ord=document.getElementById('bl-sel-ord')?document.getElementById('bl-sel-ord').value:'asc';
    var url='/rest/v1/desvios?select=id,area,tipo,status,created,updated_at,letra_exec,nomes_exec,nome,obs,foto&order=created.'+ord+'&limit=200';
    if(blFiltAr!=='todas'){
      if(!blFiltAr.includes('|')) url+='&area=like.'+blFiltAr+'%7C*';
      else url+='&area=eq.'+blFiltAr;
    }
    if(blFiltSt!=='todos') url+='&status=eq.'+blFiltSt;
    var res=await sbGet(url);
    var d=await res.json();
    el.innerHTML=d.length?d.map(function(x){return dCardHTML(x,'execucao');}).join(''):'<div class="empty"><div class="ico">✅</div><p>Nenhum desvio encontrado</p></div>';
    el.querySelectorAll('.btn-avancar-status').forEach(function(btn){
      btn.style.display='block';
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        abrirModal(this.getAttribute('data-id'),this.getAttribute('data-prox'));
      });
    });
  }catch(e){
    el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Erro ao carregar</p></div>';
  }
}

document.addEventListener('DOMContentLoaded', function(){
  renderBacklog();
});
</script>
